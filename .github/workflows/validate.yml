name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax
        run: bash -n scripts/*.sh mods/*/run.sh
      - name: ShellCheck wrappers
        run: shellcheck scripts/*.sh
      - name: Python syntax
        run: python3 -m py_compile scripts/*.py
      - name: Verify Rust parser artifact
        run: |
          echo '4c00bb276904de5a12d27b70eff97250eca54716559e06b042f17b6cc827e944  mods/install-vllm-rust-tool-parser/_rust_tool_parser.abi3.so' | sha256sum --check
          echo '116d7e69befe8204a7c54ef81fad823f1a32e70582d1d045bff786f2d92cd8a4  mods/install-vllm-rust-tool-parser/minimax-m3-incremental-streaming.patch' | sha256sum --check
