name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax
        run: bash -n scripts/*.sh mods/*/run.sh
      - name: ShellCheck wrappers
        run: shellcheck scripts/*.sh
      - name: Python syntax
        run: python3 -m py_compile scripts/*.py
      - name: Verify Rust parser artifact
        run: |
          echo '346e6e0a64613c20decc0cf97bfcdd1a02b18b836d650e23097697c4a80af275  mods/install-vllm-rust-tool-parser/_rust_tool_parser.abi3.so' | sha256sum --check
          echo '116d7e69befe8204a7c54ef81fad823f1a32e70582d1d045bff786f2d92cd8a4  mods/install-vllm-rust-tool-parser/minimax-m3-incremental-streaming.patch' | sha256sum --check
          echo '7745b940b7c06b29bb82a1f2976b543b51c83cd2b5959fbcf473fbfc898989cb  mods/install-vllm-rust-tool-parser/minimax-m3-string-streaming-on-top.patch' | sha256sum --check
